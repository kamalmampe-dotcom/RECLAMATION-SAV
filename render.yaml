# Blueprint de déploiement Render — CFAO SAV
# Render lit ce fichier (New > Blueprint). Les variables `sync: false` sont à
# renseigner manuellement dans le dashboard (secrets : Supabase, Brevo…).
services:
  - type: web
    name: cfao-sav
    runtime: node
    plan: free # passer à un plan payant pour que l'escalade (node-cron) tourne 24/7
    region: frankfurt # MÊME zone que Supabase (eu-west-1) -> faible latence DB
    branch: main
    # --include=dev car les outils de build (vite, esbuild, tsc, prisma) sont en devDependencies
    buildCommand: npm ci --include=dev && npm run build
    # Applique les migrations (via DIRECT_URL) puis démarre le serveur
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_STORE
        value: pg
      - key: ENABLE_JOBS
        value: "true"
      - key: COMPANY_NAME
        value: CFAO Mobility Cameroon
      - key: SESSION_SECRET
        generateValue: true # Render génère un secret fort automatiquement
      # --- À renseigner dans le dashboard (secrets) ---
      - key: DATABASE_URL # Supabase pooler 6543 (?pgbouncer=true)
        sync: false
      - key: DIRECT_URL # Supabase session pooler 5432
        sync: false
      - key: APP_URL # URL publique Render (ex: https://cfao-sav.onrender.com)
        sync: false
      # --- Emails ---
      # RECOMMANDÉ sur Render (le SMTP sortant est bloqué) : API HTTP Brevo.
      - key: BREVO_API_KEY
        sync: false
      # SMTP (alternative, souvent bloquée par Render) :
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: TEST_NOTIFICATION_EMAIL # adresse perso pour recevoir les emails de test
        sync: false
      # --- IA (optionnel) ---
      - key: AI_ENABLED
        value: "false"
      - key: GEMINI_API_KEY
        sync: false
