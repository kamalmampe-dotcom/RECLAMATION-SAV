name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # npm ci déclenche `postinstall` (prisma generate) — pas de base requise.
      - name: Install
        run: npm ci

      - name: Lint (TypeScript)
        run: npm run lint

      - name: Build (front + serveur)
        run: npm run build
